# fastuma.conf
# ~/.local/share/fastuma/fastuma.conf

# Image module: outfit | card | icon | mini
RESOURCE=outfit

# Random character each run? true | false
RANDOM_CHARA=true

# Random outfit for the chosen character? true | false
RANDOM_OUTFIT=true

# Used only when RANDOM_CHARA=false
# Set to a chara_game_id from uma_grouped.json  e.g. 1015 TM Opera O
FIXED_CHARA_ID=1015

# Used only when RANDOM_OUTFIT=false
# 0 is usually the classic outfit, 1, 2, etc. for alternates
FIXED_OUTFIT_INDEX=0

# Separator between character and resource name
SEPARATOR=" - "

# Name case: upper | lower | capitalize
NAME_CASE="upper"

# Name prefix
NAME_PREFIX=""

# Name suffix
NAME_SUFFIX=""

# Resource name case: upper | lower | capitalize
RESOURCE_NAME_CASE="upper"

# Resource name prefix
RESOURCE_NAME_PREFIX=""

# Resource name suffix
RESOURCE_NAME_SUFFIX=""

# Resource name decoration [Name]: true | false
RESOURCE_NAME_DECORATION=true

# Colors (31=Fuchsia, 32=Red, 33=Pink, 34=Blue, 35=Violet, 36=Cyan, 37=White)
# Fastfetch also supports bright variants (91 to 97, e.g. 96=Bright Cyan)
# Leave empty ("") for default terminal color
NAME_COLOR=""
RESOURCE_NAME_COLOR=""

# Your fastfetch base config (never modified directly)
FASTFETCH_CONFIG=~/.config/fastfetch/config.jsonc

# Image protocol: kitty | sixel | iterm2 | chafa
IMAGE_PROTOCOL=kitty
